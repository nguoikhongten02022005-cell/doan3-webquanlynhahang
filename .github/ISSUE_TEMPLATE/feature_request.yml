name: Feature request
description: De xuat tinh nang moi hoac cai tien nghiep vu
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: van_de
    attributes:
      label: Van de / nhu cau
      description: Tai sao can tinh nang nay?
    validations:
      required: true

  - type: textarea
    id: de_xuat
    attributes:
      label: De xuat giai phap
      description: Mo ta cach ban mong muon tinh nang hoat dong
    validations:
      required: true

  - type: textarea
    id: pham_vi
    attributes:
      label: Pham vi anh huong
      description: Frontend / Backend / Database / Docs / Khac

  - type: textarea
    id: tieu_chi
    attributes:
      label: Tieu chi hoan thanh
      description: Neu co, liet ke dieu kien de xem la xong
