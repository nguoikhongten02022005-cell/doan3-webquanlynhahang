name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/nest-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/nest-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --runInBand

      - name: Build backend
        run: npm run build

  monorepo-smoke:
    name: Root scripts smoke check
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify root package.json scripts exist
        run: |
          node -e "const pkg=require('./package.json'); const batBuoc=['build:frontend','build:backend','lint:frontend','lint:backend','test:backend']; const thieu=batBuoc.filter((ten)=>!pkg.scripts?.[ten]); if(thieu.length){console.error('Thieu scripts:', thieu.join(', ')); process.exit(1)}"

      - name: Verify docs snapshot folder exists
        run: test -d docs/snapshots
